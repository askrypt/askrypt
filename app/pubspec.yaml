name: askrypt
description: "Askrypt mobile — pure-Dart password manager (no native bridge)."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  # Crypto core (PLAN Phase 1): pure Dart, no Rust/FFI.
  pointycastle: ^3.9.1 # AES-256-CBC, SHA-256
  # PBKDF2 (600k iters) via native platform crypto on device — Android
  # javax.crypto / iOS CommonCrypto, hardware-accelerated — falling back to the
  # `cryptography` Dart impl off-device (tests). Standard PBKDF2-HMAC-SHA256, so
  # output is byte-identical to pointycastle (verified by the golden vectors).
  cryptography: ^2.7.0
  cryptography_flutter: ^2.3.0
  archive: ^3.6.1 # ZIP container for vault.askrypt
  flutter_riverpod: ^3.3.1
  file_picker: ^11.0.2
  path_provider: ^2.1.4 # app-private cache of the last-opened vault
  url_launcher: ^6.3.2
  # Phase 4 — mobile-native security.
  local_auth: ^2.3.0 # biometric gate (Keystore/Keychain backed)
  flutter_secure_storage: ^9.2.2 # encrypted at-rest store for cached answers

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
